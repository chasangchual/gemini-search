{% extends "base.html" %}
{% block title %}Gemini Search - Chat{% endblock %}
{% block content %}
<div class="container">
    <header>
        <h1>Gemini Search</h1>
        <div class="actions">
            <button id="new-chat-btn" class="btn btn-secondary">New Chat</button>
        </div>
    </header>

    <main id="chat-container">
        <div id="messages">
            {% for msg in messages %}
            <div class="message {{ msg.role }}">
                <div class="message-content">{{ msg.content }}</div>
                {% if msg.role == 'assistant' %}
                <button class="copy-btn" data-content="{{ msg.content | e }}">Copy</button>
                {% endif %}
            </div>
            {% endfor %}
        </div>
        <div id="typing-indicator" class="hidden">
            <span class="dot"></span>
            <span class="dot"></span>
            <span class="dot"></span>
        </div>
    </main>

    <footer>
        <form id="chat-form">
            <textarea id="message-input" name="message" placeholder="Type your message..." rows="1" autofocus></textarea>
            <button type="submit" id="send-btn" class="btn btn-primary">Send</button>
        </form>
    </footer>
</div>

<script>
const messagesContainer = document.getElementById('messages');
const chatForm = document.getElementById('chat-form');
const messageInput = document.getElementById('message-input');
const sendBtn = document.getElementById('send-btn');
const newChatBtn = document.getElementById('new-chat-btn');
const typingIndicator = document.getElementById('typing-indicator');

let currentAssistantMessage = null;
let isStreaming = false;

marked.setOptions({
    highlight: function(code, lang) {
        if (lang && hljs.getLanguage(lang)) {
            try {
                return hljs.highlight(code, { language: lang }).value;
            } catch (e) {}
        }
        return hljs.highlightAuto(code).value;
    },
    breaks: true,
    gfm: true
});

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

function addMessage(role, content) {
    const msgDiv = document.createElement('div');
    msgDiv.className = `message ${role}`;
    
    const contentDiv = document.createElement('div');
    contentDiv.className = 'message-content';
    
    if (role === 'assistant') {
        contentDiv.innerHTML = marked.parse(content);
    } else {
        contentDiv.innerHTML = escapeHtml(content);
    }
    msgDiv.appendChild(contentDiv);
    
    if (role === 'assistant') {
        const copyBtn = document.createElement('button');
        copyBtn.className = 'copy-btn';
        copyBtn.appendChild(document.createTextNode('Copy'));
        copyBtn.dataset.content = content;
        copyBtn.addEventListener('click', handleCopy);
        msgDiv.appendChild(copyBtn);
    }
    
    messagesContainer.appendChild(msgDiv);
    scrollToBottom();
    return msgDiv;
}

function scrollToBottom() {
    const container = document.getElementById('chat-container');
    container.scrollTop = container.scrollHeight;
}

function handleCopy(e) {
    const content = e.target.dataset.content;
    navigator.clipboard.writeText(content).then(() => {
        const originalText = e.target.firstChild.textContent;
        e.target.firstChild.textContent = 'Copied!';
        setTimeout(() => {
            e.target.firstChild.textContent = originalText;
        }, 2000);
    });
}

function handleNewChat() {
    fetch('/new', { method: 'POST', credentials: 'same-origin' })
        .then(res => res.json())
        .then(data => {
            document.cookie = `session=${data.session}; path=/`;
            messagesContainer.innerHTML = '';
            currentAssistantMessage = null;
        });
}

async function handleSubmit(e) {
    e.preventDefault();
    
    if (isStreaming) return;
    
    const message = messageInput.value.trim();
    if (!message) return;
    
    const formData = new FormData();
    formData.append('message', message);
    
    messageInput.value = '';
    messageInput.style.height = 'auto';
    
    addMessage('user', message);
    
    isStreaming = true;
    sendBtn.disabled = true;
    typingIndicator.classList.remove('hidden');
    
    currentAssistantMessage = addMessage('assistant', '');
    
    try {
        const response = await fetch('/chat', {
            method: 'POST',
            body: formData,
            credentials: 'same-origin',
        });
        
        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';
        let fullResponse = '';
        
        while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            
            buffer += decoder.decode(value, { stream: true });
            const lines = buffer.split('\n\n');
            buffer = lines.pop();
            
            for (const line of lines) {
                if (line.startsWith('data: ')) {
                    try {
                        const data = JSON.parse(line.slice(6));
                        if (data.partial) {
                            fullResponse += data.content;
                            const contentDiv = currentAssistantMessage.querySelector('.message-content');
                            contentDiv.textContent = fullResponse;
                            scrollToBottom();
                        }
                    } catch (err) {
                        console.error('Parse error:', err);
                    }
                }
            }
        }
        
        if (fullResponse) {
            const contentDiv = currentAssistantMessage.querySelector('.message-content');
            contentDiv.innerHTML = marked.parse(fullResponse);
            currentAssistantMessage.querySelector('.copy-btn').dataset.content = fullResponse;
        }
    } catch (err) {
        console.error('Stream error:', err);
        currentAssistantMessage.querySelector('.message-content').textContent = 'Error: ' + err.message;
    } finally {
        isStreaming = false;
        sendBtn.disabled = false;
        typingIndicator.classList.add('hidden');
        currentAssistantMessage = null;
    }
}

chatForm.addEventListener('submit', handleSubmit);
newChatBtn.addEventListener('click', handleNewChat);

messageInput.addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 200) + 'px';
});

messageInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        chatForm.dispatchEvent(new Event('submit'));
    }
});

document.querySelectorAll('.copy-btn').forEach(btn => {
    btn.addEventListener('click', handleCopy);
});
</script>
{% endblock %}
